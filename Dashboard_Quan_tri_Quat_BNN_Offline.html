<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard Quản trị sản phẩm Livotec</title>
<style>
:root{--nav:#0b3937;--mint:#10a78b;--bg:#f3f7f6;--ink:#183532;--muted:#758783;--line:#e2ebe8;--white:#fff}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:13px "Segoe UI",Arial,sans-serif}.app{display:flex;min-height:100vh}.side{width:240px;background:linear-gradient(180deg,#0b3c39,#072d2c);color:#c8ded9;padding:24px 18px;position:fixed;inset:0 auto 0 0;display:flex;flex-direction:column}.brand{display:flex;align-items:center;gap:12px;padding:0 8px 24px;border-bottom:1px solid #ffffff18}.logo{width:40px;height:40px;border-radius:12px;background:#dffff5;color:#08745f;display:grid;place-items:center;font-size:23px;font-weight:900}.brand b{display:block;color:#fff;letter-spacing:1px}.brand small{color:#83a7a0}.menu{flex:1;margin-top:20px}.menu-label{font-size:9px;letter-spacing:1.5px;color:#6f948d;margin:18px 12px 8px}.nav{border:0;background:none;color:#bdd3ce;width:100%;padding:11px 12px;border-radius:9px;text-align:left;cursor:pointer;margin:2px 0;display:flex;gap:11px;align-items:center}.nav:hover,.nav.active{background:#ffffff13;color:#fff}.nav.active{box-shadow:inset 3px 0 #43d5b5}.ico{font-size:17px;width:20px;text-align:center}.count{margin-left:auto;background:#e46b58;color:#fff;border-radius:12px;padding:2px 7px;font-size:9px}.source{border:1px solid #ffffff13;background:#ffffff08;border-radius:11px;padding:13px}.source strong{display:block;color:#41d7b6;font-size:9px;letter-spacing:1px}.source span{display:block;font-size:10px;margin-top:6px}.source small{color:#84a49e}.main{margin-left:240px;width:calc(100% - 240px);padding:0 30px 35px;max-width:1700px}.top{height:92px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}.eyebrow{font-size:9px;color:var(--mint);font-weight:800;letter-spacing:1.5px;margin-bottom:6px}.top h1{margin:0;font-size:24px}.actions{display:flex;gap:9px;align-items:center}.search{background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 12px}.search input{border:0;outline:0;width:170px}.btn{border:0;background:var(--nav);color:#fff;border-radius:9px;padding:10px 15px;cursor:pointer}.filters{display:flex;gap:12px;align-items:end;padding:18px 0}.filter{min-width:180px}.filter label{display:block;font-size:9px;color:var(--muted);font-weight:700;margin-bottom:6px}.filter select{width:100%;border:1px solid var(--line);background:#fff;border-radius:8px;padding:9px}.sync{margin-left:auto;border:0;background:none;color:#44716a;cursor:pointer}.notice{display:none;padding:11px 14px;border-radius:9px;margin-bottom:14px;background:#fff0e8;color:#a85b34;border:1px solid #f1d4c3}.kpis,.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}.card,.panel,.metric{background:#fff;border:1px solid var(--line);border-radius:13px;box-shadow:0 5px 18px #153b320d}.card{padding:17px}.card-top{display:flex;justify-content:space-between;align-items:center}.card-icon{width:32px;height:32px;border-radius:9px;background:#dff7f0;color:#0a957b;display:grid;place-items:center;font-weight:bold}.card small{color:#8a9996}.card p{color:#687c78;font-size:11px;margin:13px 0 4px}.card h2{margin:0;font-size:26px}.bar{height:5px;background:#edf2f1;border-radius:5px;margin:11px 0 7px;overflow:hidden}.bar i{height:100%;display:block;background:var(--mint)}.grid{display:grid;grid-template-columns:1fr 330px;gap:13px;margin-top:13px}.panel{padding:18px;overflow:hidden}.panel-head{display:flex;justify-content:space-between;align-items:start;margin-bottom:12px}.panel h3{margin:0 0 4px;font-size:14px}.panel-head p{margin:0;color:#899793;font-size:9px}.table-wrap{overflow:auto;max-height:550px;margin:0 -18px -18px}table{border-collapse:collapse;width:100%;min-width:820px;font-size:10px}th{position:sticky;top:0;background:#edf6f3;color:#637b76;text-align:left;padding:10px 12px;font-size:8px;z-index:1}td{padding:10px 12px;border-top:1px solid #eaf0ee;white-space:nowrap}tr:hover td{background:#f7fbfa}.pill{padding:4px 8px;border-radius:12px;background:#edf1f0;font-size:8px;font-weight:700}.good{background:#e3f5ee;color:#17765f}.warn{background:#fff0dc;color:#a86b28}.bad{background:#fde8e5;color:#bb5147}.alert{display:flex;gap:10px;padding:12px 0;border-bottom:1px solid var(--line)}.alert>i{width:27px;height:27px;background:#fde8e5;color:#c34e43;border-radius:8px;display:grid;place-items:center;font-style:normal;font-weight:bold}.alert b{display:block;font-size:10px}.alert p{margin:4px 0;color:#758682;font-size:9px}.alert small{font-size:8px;color:#98a4a1}.hero{background:linear-gradient(120deg,#0c5d53,#118f7a);color:#fff;border-radius:15px;padding:24px 28px;display:flex;justify-content:space-between;align-items:center}.hero span{font-size:9px;color:#85e5d2;letter-spacing:1.5px;font-weight:800}.hero h2{margin:7px 0 5px;font-size:24px}.hero p{margin:0;color:#c7e9e1;font-size:11px}.hero strong{font-size:32px;text-align:right}.hero strong small{display:block;font-size:9px;color:#b7ddd5}.metrics{margin:13px 0}.metric{padding:14px}.metric span{display:block;color:#798b87;font-size:9px;text-transform:uppercase}.metric b{display:block;font-size:20px;margin:5px 0}.metric small{color:#93a09d}.settings{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-top:20px}.setting{padding:24px}.setting label{color:var(--mint);font-size:9px;font-weight:bold;letter-spacing:1px}.setting h2{font-size:19px}.setting p{color:#70827e;line-height:1.7}.wide{grid-column:1/3}.rules{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.rules div{background:#f3f8f6;border-radius:9px;padding:14px}.rules b{display:block;color:var(--mint);font-size:17px;margin-bottom:5px}.empty{text-align:center;padding:40px;color:#849590}.hidden{display:none!important}.loading:after{content:"";display:inline-block;width:11px;height:11px;margin-left:7px;border:2px solid #ffffff50;border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}@media(max-width:1050px){.kpis,.metrics{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}}@media(max-width:760px){.side{position:static;width:100%;height:auto}.app{display:block}.main{margin:0;width:100%;padding:0 14px}.menu{display:flex;overflow:auto}.menu-label,.source{display:none}.nav{min-width:145px}.top{height:80px}.search{display:none}.filters{overflow:auto}.filter{min-width:145px}.kpis,.metrics{grid-template-columns:1fr}.settings{grid-template-columns:1fr}.wide{grid-column:auto}.rules{grid-template-columns:1fr 1fr}}@media print{.side,.actions,.filters{display:none}.main{margin:0;width:100%;padding:10px}.panel,.card{box-shadow:none}}
</style>
</head>
<body><div class="app">
<aside class="side"><div class="brand"><div class="logo">L</div><div><b>LIVOTEC</b><small>Product Center</small></div></div><div class="menu" id="menu"></div><div class="source"><strong id="sourceStatus">● ĐANG KẾT NỐI</strong><span>Cập nhật gần nhất</span><small id="updated">Đang tải...</small></div></aside>
<main class="main"><header class="top"><div><div class="eyebrow">PRODUCT COMMAND CENTER</div><h1 id="title">Tổng quan quản trị sản phẩm</h1></div><div class="actions"><label class="search">⌕ <input id="search" placeholder="Tìm model, trạng thái..."></label><button class="btn" onclick="window.print()">⇩ Xuất báo cáo</button></div></header>
<section class="filters" id="filters"><div class="filter"><label>Nhóm sản phẩm</label><select id="group"><option>Tất cả sản phẩm</option><option>Quạt điện</option><option>Bình nước nóng</option></select></div><div class="filter"><label>Kênh bán</label><select id="channel"><option>Tất cả kênh</option><option>MT</option><option>GT</option><option>Sanitary</option></select></div><div class="filter" id="periodBox"><label>Kỳ báo cáo</label><select id="period"><option value="2026-05">T5/2026</option><option value="2026-06">T6/2026</option><option value="2026-07" selected>T7/2026</option></select></div><button class="sync" id="sync" onclick="loadAll()">↻ Đồng bộ dữ liệu</button></section><div class="notice" id="notice"></div><div id="content"></div></main>
</div>
<script>
const API='https://script.google.com/macros/s/AKfycbz-Pw50KHXj_NZ2FVt0sQKYWnuf6uIu0QMEZFoORIZFM77wFhpmP_jJizI28eq77lA0/exec';
const pages=[['overview','⌂','Tổng quan'],['products','◇','Danh mục sản phẩm'],['sales','↗','Kinh doanh'],['inventory','▦','Tồn kho & nguồn cung'],['pipeline','◫','Pipeline & tiến độ'],['actions','✓','Action Plan'],['alerts','!','Cảnh báo'],['settings','⚙','Thiết lập báo cáo']];
const sheets={products:'01_Product_Master',sales:'02_Sales_Data',inventory:'03_Inventory',pipeline:'04_Pipeline',actions:'05_Action_Plan',alerts:'06_Alerts'};
const cfg={
products:{title:'Danh mục sản phẩm',desc:'Vai trò, phân khúc, giá bán và vòng đời model',cols:[['model','Model'],['product_group','Nhóm sản phẩm'],['category','Loại'],['segment','Phân khúc'],['channel','Kênh'],['role','Vai trò'],['rsp_vnd','Giá bán lẻ'],['status','Trạng thái'],['launch_date','Launch'],['owner','Owner']]},
sales:{title:'Hiệu quả kinh doanh',desc:'Doanh thu và sản lượng theo kỳ, model, kênh',cols:[['period','Kỳ'],['model','Model'],['product_group','Nhóm sản phẩm'],['channel','Kênh'],['revenue_plan','KH doanh thu'],['revenue_actual','Thực tế'],['quantity_plan','KH SL'],['quantity_actual','Sell-out']]},
inventory:{title:'Tồn kho & nguồn cung',desc:'Tồn kho, tốc độ bán và kế hoạch hàng về',cols:[['model','Model'],['product_group','Nhóm sản phẩm'],['channel','Kênh'],['stock_qty','Tồn kho'],['avg_sales_30d','TB bán 30 ngày'],['days_inventory','Ngày tồn'],['production_plan_qty','KH sản xuất'],['expected_receipt_date','Ngày hàng về'],['inventory_status','Trạng thái']]},
pipeline:{title:'Pipeline phát triển',desc:'Giai đoạn, tiến độ, blocker và mốc hoàn thành',cols:[['model','Model'],['product_group','Nhóm sản phẩm'],['stage','Giai đoạn'],['progress_pct','Tiến độ'],['planned_finish','KH hoàn thành'],['forecast_finish','Dự kiến'],['owner','Owner'],['priority','Ưu tiên'],['risk_level','Rủi ro'],['blocker','Blocker'],['next_action','Hành động tiếp']]},
actions:{title:'Action Plan',desc:'Công việc, người phụ trách và cam kết thời hạn',cols:[['action_id','ID'],['model','Model'],['channel','Kênh'],['action','Công việc'],['expected_output','Đầu ra'],['owner','Owner'],['deadline','Deadline'],['status','Trạng thái'],['progress_pct','Tiến độ'],['priority','Ưu tiên']]},
alerts:{title:'Trung tâm cảnh báo',desc:'Vấn đề cần hành động hoặc quyết định ưu tiên',cols:[['severity','Mức độ'],['model','Model'],['channel','Kênh'],['alert_type','Loại'],['issue','Vấn đề'],['business_impact','Ảnh hưởng'],['recommended_action','Đề xuất xử lý'],['owner','Owner'],['due_date','Hạn xử lý'],['status','Trạng thái']]}};
let data={},page='overview',lastUpdate='';const $=id=>document.getElementById(id),num=v=>Number(v||0),money=v=>v>=1e9?(v/1e9).toLocaleString('vi-VN',{maximumFractionDigits:1})+' tỷ':v>=1e6?Math.round(v/1e6).toLocaleString('vi-VN')+' triệu':v.toLocaleString('vi-VN'),pct=v=>Math.round(num(v)<=1?num(v)*100:num(v))+'%',esc=s=>String(s??'—').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function makeMenu(){$('menu').innerHTML='<div class="menu-label">QUẢN TRỊ</div>'+pages.map((p,i)=>(i===7?'<div class="menu-label">HỆ THỐNG</div>':'')+`<button class="nav ${page===p[0]?'active':''}" onclick="openPage('${p[0]}')"><span class="ico">${p[1]}</span>${p[2]}${p[0]==='alerts'&&data.alerts?`<span class="count">${data.alerts.length}</span>`:''}</button>`).join('')}
async function loadAll(){const b=$('sync');b.classList.add('loading');b.textContent='Đang đồng bộ';$('notice').style.display='none';try{const result=await Promise.all(Object.entries(sheets).map(async([k,s])=>{const r=await fetch(`${API}?sheet=${s}&ts=${Date.now()}`,{cache:'no-store'}),j=await r.json();if(!j.success)throw Error(s);return[k,j.data||[],j.updated_at]}));data={};result.forEach(x=>data[x[0]]=x[1]);lastUpdate=result[0][2]||new Date().toISOString();localStorage.setItem('livotecDashboard',JSON.stringify({data,lastUpdate}));$('sourceStatus').textContent='● GOOGLE SHEETS ONLINE';$('updated').textContent=new Date(lastUpdate).toLocaleString('vi-VN');render()}catch(e){const saved=localStorage.getItem('livotecDashboard');if(saved){const x=JSON.parse(saved);data=x.data;lastUpdate=x.lastUpdate;$('notice').textContent='Không lấy được dữ liệu mới. Đang hiển thị dữ liệu đã lưu gần nhất.';$('notice').style.display='block';$('sourceStatus').textContent='● DỮ LIỆU ĐÃ LƯU';render()}else{$('notice').textContent='Không thể kết nối Google Sheets. Kiểm tra Internet và quyền Apps Script.';$('notice').style.display='block'}}finally{b.classList.remove('loading');b.textContent='↻ Đồng bộ dữ liệu'}}
function openPage(p){page=p;$('search').value='';makeMenu();render();scrollTo({top:0,behavior:'smooth'})}function filtered(){return(data[page]||[]).filter(r=>Object.values(r).join(' ').toLowerCase().includes($('search').value.toLowerCase())&&($('group').value==='Tất cả sản phẩm'||r.product_group===$('group').value)&&($('channel').value==='Tất cả kênh'||r.channel===$('channel').value)&&(page!=='sales'||r.period===$('period').value))}
function render(){makeMenu();$('periodBox').classList.toggle('hidden',!['overview','sales'].includes(page));$('filters').classList.toggle('hidden',page==='settings');$('title').textContent=page==='overview'?'Tổng quan quản trị sản phẩm':page==='settings'?'Thiết lập báo cáo':cfg[page].title;if(page==='overview')renderOverview();else if(page==='settings')renderSettings();else renderData()}
function renderOverview(){const s=(data.sales||[]).filter(r=>r.period===$('period').value&&($('group').value==='Tất cả sản phẩm'||r.product_group===$('group').value)&&($('channel').value==='Tất cả kênh'||r.channel===$('channel').value)),t=s.reduce((a,r)=>({a:a.a+num(r.revenue_actual),p:a.p+num(r.revenue_plan),q:a.q+num(r.quantity_actual),qp:a.qp+num(r.quantity_plan)}),{a:0,p:0,q:0,qp:0}),ach=t.p?Math.round(t.a/t.p*100):0,qach=t.qp?Math.round(t.q/t.qp*100):0;
$('content').innerHTML=`<section class="kpis">${card('↗','Doanh thu tháng',money(t.a),`${ach}% kế hoạch ${money(t.p)}`,ach)}${card('▤','Sản lượng sell-out',t.q.toLocaleString('vi-VN')+' sp',`${qach}% mục tiêu`,qach)}${card('◇','Danh mục quản trị',(data.products||[]).length+' model',(data.pipeline||[]).length+' dự án trong pipeline')}${card('!','Cảnh báo',(data.alerts||[]).length+' việc','Cần theo dõi và xử lý')}</section><section class="grid"><article class="panel"><div class="panel-head"><div><h3>Pipeline ưu tiên</h3><p>Dữ liệu trực tiếp từ Google Sheets</p></div></div>${table((data.pipeline||[]).slice(0,7),cfg.pipeline.cols.slice(0,7))}</article><aside class="panel"><div class="panel-head"><div><h3>Cảnh báo ưu tiên</h3><p>Cần quyết định hoặc hành động</p></div></div>${(data.alerts||[]).slice(0,5).map(r=>`<div class="alert"><i>!</i><div><b>${esc(r.issue)}</b><p>${esc(r.business_impact)}</p><small>${esc(r.owner)} · ${esc(r.due_date)}</small></div></div>`).join('')}</aside></section>`}
function card(i,l,v,n,p){return`<article class="card"><div class="card-top"><span class="card-icon">${i}</span><small>Dữ liệu trực tiếp</small></div><p>${l}</p><h2>${v}</h2>${p!==undefined?`<div class="bar"><i style="width:${Math.min(p,100)}%"></i></div>`:''}<small>${n}</small></article>`}
function renderData(){const rows=filtered(),v=cfg[page],m=stats(page,data[page]||[]);$('content').innerHTML=`<section class="hero"><div><span>LIVE DATA · GOOGLE SHEETS</span><h2>${v.title}</h2><p>${v.desc}</p></div><strong>${rows.length}<small>bản ghi hiển thị</small></strong></section><section class="metrics">${m.map(x=>`<div class="metric"><span>${x[0]}</span><b>${x[1]}</b><small>${x[2]}</small></div>`).join('')}</section><article class="panel"><div class="panel-head"><div><h3>Bảng dữ liệu chi tiết</h3><p>Kết quả theo bộ lọc hiện tại</p></div></div>${rows.length?table(rows,v.cols):'<div class="empty">Không có dữ liệu phù hợp.</div>'}</article>`}
function table(rows,cols){return`<div class="table-wrap"><table><thead><tr>${cols.map(c=>`<th>${c[1]}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${cell(c[0],r[c[0]])}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}function cell(k,v){if(/revenue|rsp_vnd/.test(k))return money(num(v));if(k==='progress_pct')return`<div class="bar" style="width:70px;display:inline-block"><i style="width:${pct(v)}"></i></div> ${pct(v)}`;if(/status|risk|severity|priority/.test(k)){const s=String(v||''),c=/high|critical|cao|delayed/i.test(s)?'bad':/medium|watch|tồn cao|nguy cơ/i.test(s)?'warn':'good';return`<span class="pill ${c}">${esc(s)}</span>`}if(/qty|days_inventory|sales_30d/.test(k))return num(v).toLocaleString('vi-VN');return esc(v)}
function stats(p,r){if(p==='products')return[['Tổng model',r.length,'Trong danh mục'],['Quạt điện',r.filter(x=>x.product_group==='Quạt điện').length,'model'],['Bình nước nóng',r.filter(x=>x.product_group==='Bình nước nóng').length,'model'],['Đang bán',r.filter(x=>/đang bán/i.test(x.status)).length,'model active']];if(p==='sales')return[['Doanh thu',money(r.reduce((a,x)=>a+num(x.revenue_actual),0)),'Tất cả kỳ'],['Kế hoạch',money(r.reduce((a,x)=>a+num(x.revenue_plan),0)),'Tất cả kỳ'],['Sell-out',r.reduce((a,x)=>a+num(x.quantity_actual),0).toLocaleString('vi-VN'),'sản phẩm'],['Số bản ghi',r.length,'dòng dữ liệu']];if(p==='inventory')return[['Tổng tồn',r.reduce((a,x)=>a+num(x.stock_qty),0).toLocaleString('vi-VN'),'sản phẩm'],['Tồn cao',r.filter(x=>/tồn cao/i.test(x.inventory_status)).length,'model'],['Nguy cơ thiếu',r.filter(x=>/thiếu|đứt/i.test(x.inventory_status)).length,'model'],['KH sản xuất',r.reduce((a,x)=>a+num(x.production_plan_qty),0).toLocaleString('vi-VN'),'sản phẩm']];return[['Tổng bản ghi',r.length,'đang quản trị'],['Ưu tiên cao',r.filter(x=>/high|critical/i.test(x.priority||x.severity)).length,'cần xử lý'],['Có rủi ro',r.filter(x=>/high|medium|watch|delayed/i.test(x.risk_level||x.status)).length,'cần theo dõi'],['Hoàn thành',r.filter(x=>/completed|resolved/i.test(x.status)).length,'đã đóng']]}
function renderSettings(){$('content').innerHTML=`<section class="settings"><article class="panel setting"><label>NGUỒN DỮ LIỆU</label><h2>Google Sheets</h2><p>File HTML đang đọc 6 sheet: danh mục, kinh doanh, tồn kho, pipeline, action plan và cảnh báo.</p><span class="pill good">● Kết nối hoạt động</span></article><article class="panel setting"><label>ĐỒNG BỘ</label><h2>${lastUpdate?new Date(lastUpdate).toLocaleString('vi-VN'):'Chưa cập nhật'}</h2><p>Dữ liệu tải mới khi mở dashboard hoặc bấm nút Đồng bộ.</p><button class="btn" onclick="loadAll()">↻ Đồng bộ ngay</button></article><article class="panel setting wide"><label>QUY TẮC CẬP NHẬT</label><h2>Giữ nguyên cấu trúc Google Sheets</h2><div class="rules"><div><b>01</b>Mỗi dòng là một bản ghi</div><div><b>02</b>Không đổi tên sheet</div><div><b>03</b>Không đổi tên cột</div><div><b>04</b>Tiền và sản lượng nhập dạng số</div></div></article></section>`}
['search','group','channel','period'].forEach(id=>$(id).addEventListener(id==='search'?'input':'change',render));makeMenu();loadAll();
</script></body></html>
